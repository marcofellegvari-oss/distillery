<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hungarian Hammer Distillery OS</title>
<meta name="theme-color" content="#0D0D0D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="HH Distillery">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Crect%20width='100'%20height='100'%20rx='20'%20fill='%230D0D0D'/%3E%3Ccircle%20cx='50'%20cy='50'%20r='34'%20fill='none'%20stroke='%23B87333'%20stroke-width='4'/%3E%3Cg%20transform='rotate(45%2050%2050)'%20fill='%23B87333'%3E%3Crect%20x='47'%20y='32'%20width='6'%20height='36'%20rx='1.5'/%3E%3Crect%20x='39'%20y='28'%20width='22'%20height='12'%20rx='2'/%3E%3C/g%3E%3C/svg%3E">
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Hungarian%20Hammer%20Distillery%20OS%22%2C%22short_name%22%3A%22HH%20Distillery%22%2C%22display%22%3A%22standalone%22%2C%22orientation%22%3A%22portrait-primary%22%2C%22background_color%22%3A%22%230D0D0D%22%2C%22theme_color%22%3A%22%230D0D0D%22%2C%22start_url%22%3A%22.%22%7D">
<style>
:root{color-scheme:dark;--black:#0D0D0D;--gun:#2B2E34;--gun2:#23262b;--copper:#B87333;--copper-lt:#d6934c;--copper-glow:#b8733355;--steel:#8C8F94;--steel-dim:#6b6e73;--burgundy:#8B1E1E;--cream:#F5EFE6;--hred:#C8102E;--green:#225E3E;--green-lt:#3a8a5f;--brown:#7A5A3A;--ink:#F5EFE6;--muted:#8C8F94;--line:#3a3d4488;--line2:#43464d;--serif:"Cormorant Garamond","Cinzel",Georgia,"Times New Roman",serif;--sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;--noise:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/></svg>");}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--noise),radial-gradient(1000px 460px at 82% -12%,#1c1f24 0,transparent 62%),linear-gradient(180deg,#0f1013 0,#0a0b0d 100%);background-attachment:fixed;color:var(--ink);min-height:100vh;font-family:var(--sans);font-size:14.5px;line-height:1.55;-webkit-font-smoothing:antialiased}
.app{max-width:1180px;margin:0 auto;padding:16px 14px 90px}
.masthead{display:flex;align-items:center;gap:14px;padding:4px 4px 14px;border-bottom:1px solid var(--line2);margin-bottom:16px;flex-wrap:wrap}
.badge-logo{width:52px;height:52px;flex:0 0 auto;filter:drop-shadow(0 4px 10px #0008)}
.brandwrap{flex:1;min-width:180px}
.brandwrap h1{margin:0;font-family:var(--serif);font-size:25px;font-weight:700;letter-spacing:2px;text-transform:uppercase;line-height:1}
.brandwrap h1 .cu{color:var(--copper-lt)}
.brandwrap .tl{color:var(--copper);font-size:10px;letter-spacing:4px;text-transform:uppercase;margin-top:4px;font-weight:600}
.mhright{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.mh-date{font-size:11px;color:var(--muted);text-align:right}
.statuschip{display:flex;align-items:center;gap:7px;background:var(--gun2);border:1px solid var(--line2);border-radius:10px;padding:7px 11px;font-size:12px;font-weight:600}
.batchpick select{background:var(--gun2);color:var(--ink);border:1px solid var(--line2);border-radius:9px;padding:8px 10px;font-size:12.5px;font-weight:600}
.hamb{display:none;flex:0 0 auto;width:42px;height:42px;border-radius:11px;border:1px solid var(--line2);background:var(--gun2);color:var(--copper-lt);font-size:20px;cursor:pointer}
.hamb:hover{border-color:var(--copper)}
.cmdbar{display:flex;gap:8px;align-items:center;background:linear-gradient(180deg,rgba(43,46,52,.85),rgba(28,30,35,.85));border:1px solid var(--line2);border-radius:14px;padding:8px;margin-bottom:16px;box-shadow:0 8px 26px #0005}
.cmdbar input{flex:1;min-width:120px}
.mic{flex:0 0 auto;width:44px;height:44px;border-radius:11px;border:1px solid var(--line2);background:var(--gun2);color:var(--copper-lt);font-size:19px;cursor:pointer}
.mic:hover{border-color:var(--copper)}
.mic.on{background:var(--burgundy);color:#fff;border-color:var(--hred);animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #c8102e66}50%{box-shadow:0 0 0 8px #c8102e00}}
.cmdcard{background:linear-gradient(180deg,rgba(43,46,52,.85),rgba(30,32,37,.85));border:1px solid var(--copper);border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:0 0 22px var(--copper-glow)}
.cmdcard h4{margin:0 0 3px;font-family:var(--serif);font-size:17px;color:var(--copper-lt)}
.cmdcard .sg{display:flex;gap:9px;align-items:flex-start;padding:8px 0;border-top:1px solid var(--line);font-size:13px}
.cmdcard .sg .i{color:var(--copper-lt);flex:0 0 auto}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--green);color:#eafff2;padding:10px 18px;border-radius:10px;font-weight:700;z-index:95;box-shadow:0 6px 20px #0007;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
.mdalerts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.mdalert{display:flex;gap:9px;align-items:flex-start;padding:9px 11px;border-radius:10px;font-size:13px;border:1px solid var(--line2);background:#15161a}
.mdalert.warn{border-color:#7a2a2c;background:#26161a;color:#e9b4b6}
.mdalert.info{border-color:#4a3a22;background:#211d15;color:#e0c79a}
.mdalert .ai{flex:0 0 auto}
.mdok{font-size:13px;color:#7fbf95;margin-bottom:12px}
.daily{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;background:linear-gradient(180deg,#2a2620,#211d17);border:1px solid var(--copper);border-radius:14px;padding:12px 15px;margin-bottom:16px;box-shadow:0 0 18px var(--copper-glow);font-size:13.5px}
.camimg{width:100%;max-width:260px;border-radius:10px;border:1px solid var(--line2);margin:4px 0 10px}
.shell{display:flex;gap:18px;align-items:flex-start}
.sidebar{flex:0 0 200px;position:sticky;top:14px}
.nav{display:flex;flex-direction:column;gap:3px;background:linear-gradient(180deg,rgba(43,46,52,.7),rgba(28,30,35,.7));border:1px solid var(--line2);border-radius:14px;padding:8px}
.nav .ni{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;color:var(--steel);font-size:13.5px;font-weight:600;cursor:pointer;border:1px solid transparent}
.nav .ni .ico{width:17px;text-align:center}
.nav .ni:hover{color:var(--cream);background:#ffffff08}
.nav .ni.active{color:var(--cream);background:linear-gradient(90deg,var(--copper-glow),transparent);border-color:var(--copper);box-shadow:inset 2px 0 0 var(--copper)}
.newbatch{margin-top:8px;width:100%}
.main{flex:1;min-width:0}
.card{background:linear-gradient(180deg,rgba(43,46,52,.72),rgba(30,32,37,.72));border:1px solid var(--line2);border-radius:16px;box-shadow:0 8px 26px #0005;overflow:hidden}
.card+.card{margin-top:16px}
.card-h{padding:13px 17px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.card-h h2{margin:0;font-family:var(--serif);font-size:17px;font-weight:700;letter-spacing:1px;color:var(--cream)}
.card-h .eyebrow{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--copper);font-weight:700}
.card-b{padding:17px}
.hint{color:var(--muted);font-size:12px}
.btn{border:none;border-radius:10px;padding:9px 15px;font-size:13.5px;font-weight:700;cursor:pointer;background:linear-gradient(180deg,var(--copper-lt),var(--copper));color:#1a0f05;letter-spacing:.3px;font-family:var(--sans)}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:var(--gun2);color:var(--steel);border:1px solid var(--line2)}
.btn.ghost:hover{color:var(--cream);border-color:var(--copper)}
.btn.sm{padding:6px 11px;font-size:12.5px}
.btn.red{background:transparent;color:#d9686e;padding:6px 8px}
.btn.green{background:linear-gradient(180deg,var(--green-lt),var(--green));color:#eafff2}
.btn.steel{background:linear-gradient(180deg,#cdd0d5,#9a9da3);color:#161a1f}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.tile{background:linear-gradient(180deg,#31343b,#25272c);border:1px solid var(--line2);border-radius:13px;padding:13px 14px;position:relative;overflow:hidden}
.tile .k{font-size:10px;text-transform:uppercase;letter-spacing:1.4px;color:var(--steel-dim);font-weight:700}
.tile .v{font-family:var(--serif);font-size:26px;font-weight:700;margin-top:4px}
.tile .v small{font-size:13px;color:var(--muted);font-weight:600;font-family:var(--sans)}
.tile.hot .v{color:var(--copper-lt)}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle}
.bubbles{position:absolute;right:8px;bottom:0;width:40px;height:100%;pointer-events:none;opacity:.5}
.bubbles span{position:absolute;bottom:-6px;width:5px;height:5px;border-radius:50%;background:var(--copper-lt);animation:rise 3.2s linear infinite}
.bubbles span:nth-child(2){left:12px;width:4px;height:4px;animation-delay:.9s}
.bubbles span:nth-child(3){left:22px;width:6px;height:6px;animation-delay:1.7s}
.bubbles span:nth-child(4){left:30px;width:3px;height:3px;animation-delay:2.3s}
@keyframes rise{0%{transform:translateY(0);opacity:0}15%{opacity:.9}100%{transform:translateY(-64px);opacity:0}}
.row{display:flex;gap:12px;flex-wrap:wrap}
.field{flex:1;min-width:130px;margin-bottom:12px}
.field.wide{flex-basis:100%}
label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--steel-dim);font-weight:700;margin-bottom:5px}
input,select,textarea{width:100%;background:#15161a;color:var(--ink);border:1px solid var(--line2);border-radius:9px;padding:9px 10px;font-size:14px;font-family:inherit}
textarea{min-height:64px;resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--copper);box-shadow:0 0 0 3px var(--copper-glow)}
.radios{display:flex;gap:6px;flex-wrap:wrap}
.radios .opt{flex:1;min-width:62px;text-align:center;background:#15161a;border:1px solid var(--line2);border-radius:8px;padding:7px 4px;font-size:12.5px;font-weight:600;color:var(--steel-dim);cursor:pointer}
.radios .opt.on{background:linear-gradient(180deg,var(--copper-lt),var(--copper));color:#1a0f05;border-color:var(--copper)}
.timeline{display:flex;flex-wrap:wrap}
.stg{display:flex;align-items:center}
.stnode{display:flex;flex-direction:column;align-items:center;cursor:pointer;min-width:80px;padding:4px 2px}
.stbead{width:28px;height:28px;border-radius:50%;border:2px solid var(--line2);background:#15161a;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--steel-dim)}
.stnode .lbl{font-family:var(--serif);font-size:11px;text-align:center;margin-top:6px;color:var(--steel-dim);max-width:80px}
.stnode.cur .stbead{box-shadow:0 0 0 4px #ffffff12,0 0 16px currentColor;transform:scale(1.1)}
.stbar{width:24px;height:2px;background:var(--line2);margin-top:13px}
.ring{--p:0;width:82px;height:82px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--copper) calc(var(--p)*1%),#2c2f35 0);position:relative}
.ring::before{content:"";position:absolute;inset:7px;border-radius:50%;background:#1c1e22}
.ring .rv{position:relative;font-family:var(--serif);font-size:19px;font-weight:700;color:var(--copper-lt)}
.entry{display:flex;gap:12px;padding:13px 0;border-bottom:1px dashed var(--line)}
.entry:last-child{border-bottom:none}
.entry .ed{flex:0 0 auto;width:10px;height:10px;border-radius:50%;background:var(--copper);margin-top:6px;box-shadow:0 0 0 3px var(--copper-glow)}
.ewhen{font-size:12px;color:var(--muted);font-weight:700}
.etags{display:flex;gap:7px;flex-wrap:wrap;margin:5px 0}
.tag{font-size:11px;background:#15161a;border:1px solid var(--line2);color:var(--steel);border-radius:6px;padding:2px 8px;font-weight:600}
.enote{white-space:pre-wrap;margin-top:3px}
.ephotos{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
.ephotos img{width:92px;height:92px;object-fit:cover;border-radius:9px;border:1px solid var(--line2);cursor:pointer}
.entry .del{opacity:0}
.entry:hover .del{opacity:1}
.lrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.lrow:last-child{border-bottom:none}
.lrow .nm{flex:1;font-weight:600}
.lrow .sub{color:var(--muted);font-size:12px;font-weight:400}
.qty{width:70px!important;text-align:center}
.chip{font-size:10.5px;padding:2px 8px;border-radius:999px;font-weight:700}
.chip.low{background:#3a1516;color:#e0757b}
.chip.ok{background:#12301f;color:#4fbe80}
.check{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer}
.check:last-child{border-bottom:none}
.check .box{width:22px;height:22px;border-radius:6px;border:2px solid var(--line2);display:grid;place-items:center;font-size:13px;color:transparent}
.check.on .box{background:var(--green);border-color:var(--green-lt);color:#eafff2}
.check.on .ctxt{color:var(--muted);text-decoration:line-through}
.wof{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.fame{background:linear-gradient(180deg,#2b2e34,#1a1c20);border:1px solid var(--line2);border-radius:14px;padding:16px;position:relative;overflow:hidden}
.fame .medal{position:absolute;top:12px;right:14px;font-size:22px}
.fame h3{margin:0 0 2px;font-family:var(--serif);font-size:17px}
.fame .nick{color:var(--copper-lt);font-size:12.5px;font-style:italic;margin-bottom:11px}
.fame .fg{display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:12.5px}
.fame .fg .k{color:var(--steel-dim)}
.stars{color:#d9a441;letter-spacing:1px}
.label-preview{background:var(--cream);color:#1a1512;border-radius:5px;padding:22px;width:300px;margin:0 auto;text-align:center;box-shadow:0 10px 34px #000a;border:1px solid #d8cdbb}
.label-preview .lp-emoji{font-size:30px}
.label-preview .lp-brand{font-family:var(--serif);font-weight:700;letter-spacing:3px;font-size:21px;text-transform:uppercase;margin:4px 0}
.label-preview .lp-tl{font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:#7a6f60}
.label-preview .lp-rule{height:2px;background:#1a1512;margin:9px auto;width:58%}
.label-preview .lp-prod{font-family:var(--serif);font-size:17px;letter-spacing:2px;text-transform:uppercase;margin:6px 0}
.label-preview .lp-abv{font-family:var(--serif);font-size:27px;font-weight:700}
.label-preview .lp-meta{font-size:10.5px;letter-spacing:1px;color:#5a5148;margin-top:10px;text-transform:uppercase}
.label-preview .lp-batch{font-size:11.5px;font-weight:700;letter-spacing:2px;margin-top:6px}
.gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.gal figure{margin:0}
.gal img{width:100%;height:120px;object-fit:cover;border-radius:10px;border:1px solid var(--line2);cursor:pointer}
.gal figcaption{font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase}
.lb{position:fixed;inset:0;background:#060607ee;display:none;align-items:center;justify-content:center;z-index:90;padding:24px}
.lb.open{display:flex}
.lb img{max-width:100%;max-height:100%;border-radius:12px}
.lb .close{position:absolute;top:14px;right:20px;color:#fff;font-size:32px;background:none;border:none;cursor:pointer}
.modal{position:fixed;inset:0;background:#06060799;display:none;align-items:center;justify-content:center;z-index:80;padding:20px}
.modal.open{display:flex}
.modal .mcard{background:var(--gun);border:1px solid var(--line2);border-radius:16px;padding:20px;max-width:470px;width:100%;max-height:90vh;overflow:auto}
.modal h3{margin:0 0 14px;font-family:var(--serif);font-size:19px}
.thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.thumb{position:relative}
.thumb img{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--line2)}
.thumb .x{position:absolute;top:-6px;right:-6px;background:var(--burgundy);color:#fff;border:none;border-radius:50%;width:19px;height:19px;font-size:11px;cursor:pointer}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.brandbadge{font-size:9.5px;font-weight:800;letter-spacing:1px;padding:2px 7px;border-radius:5px;text-transform:uppercase}
.brandbadge.hammer{background:#2b2e34;color:var(--steel);border:1px solid var(--line2)}
.brandbadge.palinka{background:#33141c;color:#e0757b;border:1px solid #5a2530}
@media(max-width:820px){
  .shell{flex-direction:column}
  .sidebar{position:static;flex:1 1 auto;width:100%}
  .nav{display:none;margin-bottom:8px}
  .nav.open{display:flex}
  .newbatch{width:100%}
  .grid2{grid-template-columns:1fr}
  .hamb{display:inline-flex;align-items:center;justify-content:center}
  .brandwrap h1{font-size:20px}
}
</style>
</head>
<body>
<div class="app">
  <div class="masthead">
    <button class="hamb" onclick="toggleNav()" aria-label="Menu">☰</button>
    <svg class="badge-logo" viewBox="0 0 100 100" aria-label="Hungarian Hammer Distillery">
      <defs><radialGradient id="cop" cx="50%" cy="38%" r="70%"><stop offset="0%" stop-color="#e0a05a"/><stop offset="55%" stop-color="#B87333"/><stop offset="100%" stop-color="#5f3a18"/></radialGradient></defs>
      <circle cx="50" cy="50" r="47" fill="#15161a" stroke="url(#cop)" stroke-width="3"/>
      <circle cx="50" cy="50" r="41" fill="none" stroke="#B87333" stroke-width="1" opacity=".5"/>
      <g stroke="#B87333" stroke-width="1.4" opacity=".55"><line x1="50" y1="10" x2="50" y2="18"/><line x1="50" y1="82" x2="50" y2="90"/><line x1="10" y1="50" x2="18" y2="50"/><line x1="82" y1="50" x2="90" y2="50"/></g>
      <g transform="rotate(45 50 50)" fill="url(#cop)" stroke="#4a2c12" stroke-width="1"><rect x="47" y="30" width="6" height="40" rx="1.5"/><rect x="38" y="26" width="24" height="13" rx="2.5"/></g>
    </svg>
    <div class="brandwrap"><h1><span class="cu">Hungarian</span> Hammer</h1><div class="tl">Distillery · Forged in South Australia</div></div>
    <div class="mhright"><div class="statuschip" id="mhStatus"></div><div class="batchpick"><select id="activePick" onchange="setActive(this.value)"></select></div><div class="mh-date" id="mhDate"></div></div>
  </div>

  <div class="cmdbar">
    <button id="micBtn" class="mic" onclick="toggleMic()" title="Speak">🎙️</button>
    <button id="camBtn" class="mic" onclick="openCamera()" title="Take a photo">📷</button>
    <input type="file" accept="image/*" capture="environment" id="camInput" style="display:none" onchange="camCaptured(this)">
    <input id="cmdInput" placeholder="Say or type what's going on — e.g. “Hungarian Hammer, 16 degrees, bubbling slowly, smells boozy”" onkeydown="if(event.key==='Enter')runCommand()">
    <button class="btn" onclick="runCommand()">Log it</button>
  </div>
  <div id="cmdResult"></div>
  <div id="dailyPrompt"></div>

  <div class="shell">
    <aside class="sidebar"><nav class="nav" id="nav"></nav><button class="btn newbatch" onclick="openBatchModal()">+ New batch</button></aside>
    <main class="main" id="view"></main>
  </div>
</div>

<div class="lb" id="lb" onclick="closeLB()"><button class="close">&times;</button><img id="lbimg" alt=""></div>

<div class="modal" id="batchModal"><div class="mcard"><h3>New batch</h3>
  <div class="row"><div class="field" style="flex:0 0 70px"><label>Emoji</label><input id="nbEmoji" value="🔨" maxlength="4"></div><div class="field"><label>Batch code</label><input id="nbCode" placeholder="HH-002"></div><div class="field"><label>Brand</label><select id="nbBrand"><option value="hammer">🔨 Hungarian Hammer</option><option value="palinka">🫏 Pálinka Banda</option></select></div></div>

var db;
function migrate(){
  var s=seed();
  if(!db||typeof db!=="object")db=s;
  if(!Array.isArray(db.batches))db.batches=[];
  if(!Array.isArray(db.recipes)||!db.recipes.length)db.recipes=s.recipes;
  if(!Array.isArray(db.inventory)||!db.inventory.length)db.inventory=s.inventory;
  if(!Array.isArray(db.equipment)||!db.equipment.length)db.equipment=s.equipment;
  if(!Array.isArray(db.sales))db.sales=[];
  if(!Array.isArray(db.experiments))db.experiments=[];
  if(!db.stillType)db.stillType="Reflux (T500)";
  db.batches.forEach(function(b){
    if(!b.prep)b.prep={water:false,cleaning:false,jars:false,cuts:false,notes:""};
    if(!b.distill)b.distill={boiler:"",cooling:"",startTime:"",heads:"",hearts:"",tails:"",totalAlc:"",outputPct:"",speed:"",waterTemp:"",notes:""};
    if(!b.bottling)b.bottling={count:"",size:"700",date:"",notes:""};
    if(!b.score)b.score={rating:0,medal:"",taste:""};
    if(!Array.isArray(b.log))b.log=[];
    ["emoji","brand","nick","product","yeast","sugar","startGravity","predictedFG","currentGravity","start","finish","temp","bubble","smell","yieldL","abv","code"].forEach(function(k){if(b[k]===undefined||b[k]===null)b[k]="";});
    if(!b.stage)b.stage="fermentation";
    if(!b.brand)b.brand="hammer";
    if(!b.emoji)b.emoji=b.brand==="palinka"?"🫏":"🔨";
    b.log.forEach(function(e){if(!Array.isArray(e.photos))e.photos=[];});
  });
  if(!db.active||!db.batches.some(function(b){return b.id===db.active;}))db.active=db.batches[0]?db.batches[0].id:null;
}

function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

function fmtDate(d){return d?new Date(d+"T00:00").toLocaleDateString(undefined,{day:"numeric",month:"short",year:"numeric"}):"—";}
function dayNum(b){if(!b.start)return"—";var s=new Date(b.start+"T00:00");return Math.max(1,Math.floor((Date.now()-s)/86400000)+1);}
function daysTo(d){if(!d)return null;return Math.ceil((new Date(d+"T00:00")-Date.now())/86400000);}
function latest(b,key){for(var i=b.log.length-1;i>=0;i--){if(b.log[i][key])return b.log[i][key];}return"";}

var camPhoto=null;

function camCaptured(input){var file=input.files[0];input.value="";if(!file)return;var r=new FileReader();r.onload=function(ev){var img=new Image();img.onload=function(){var max=1200,w=img.width,h=img.height;if(w>max||h>max){var sc=Math.min(max/w,max/h);w=Math.round(w*sc);h=Math.round(h*sc);}var c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);camPhoto=c.toDataURL("image/jpeg",0.75);showCamCard();};img.src=ev.target.result;};r.readAsDataURL(file);}
function showCamCard(){var b=activeBatch();var batchOpts=db.batches.map(function(x){return '<option value="'+x.id+'" '+(x.id===b.id?"selected":"")+">"+esc(x.emoji)+" "+esc(x.code)+"</option>";}).join("");document.getElementById("cmdResult").innerHTML='<div class="cmdcard"><h4>📷 Log this photo</h4><img class="camimg" src="'+camPhoto+'"><div class="hint" style="margin-bottom:10px">Photo saved to the batch log. Type any values you can read off it (temp, gravity, level) and I\'ll record them.</div><div class="row"><div class="field"><label>Batch</label><select id="cm-batch">'+batchOpts+'</select></div><div class="field"><label>Temp °C</label><input id="cm-temp" placeholder="18"></div><div class="field"><label>Stage</label><select id="cm-stage"><option value=""></option>'+STAGES.map(function(s){return '<option value="'+s.k+'" '+(s.k===b.stage?"selected":"")+'>'+s.l+'</option>';}).join("")+'</select></div></div><div class="row"><div class="field"><label>Bubble</label><select id="cm-bubble"><option value=""></option>'+BUBBLE.map(function(o){return '<option '+(o===b.bubble?"selected":"")+'>'+o+'</option>';}).join("")+'</select></div><div class="field"><label>Gravity (SG)</label><input id="cm-sg" placeholder="1.010"></div></div><div class="field wide"><label>Note</label><textarea id="cm-note" placeholder="What the photo shows…"></textarea></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn ghost sm" onclick="camPhoto=null;document.getElementById(\'cmdResult\').innerHTML=\'\'">Discard</button><button class="btn sm" onclick="applyCam()">Save to log</button></div></div>';document.getElementById("cmdResult").scrollIntoView({behavior:"smooth",block:"nearest"});}
function applyCam(){if(!camPhoto)return;var bid=document.getElementById("cm-batch").value;var b=db.batches.find(function(x){return x.id===bid;})||activeBatch();db.active=b.id;var temp=document.getElementById("cm-temp").value.trim();var bubble=document.getElementById("cm-bubble").value;var stage=document.getElementById("cm-stage").value;var sg=document.getElementById("cm-sg").value.trim();var note=document.getElementById("cm-note").value.trim();if(temp)b.temp=temp;if(bubble)b.bubble=bubble;if(stage)b.stage=stage;if(sg)b.currentGravity=sg;b.log.push({id:uid(),when:new Date().toISOString().slice(0,16),stage:stage||b.stage,temp:temp,bubble:bubble,smell:"",note:note||"Photo check-in"+(sg?" · SG "+sg:""),photos:[camPhoto]});camPhoto=null;save();document.getElementById("cmdResult").innerHTML="";renderAll();toast("📷 Photo logged to "+b.code);}

var ACTIVE_STAGES=["fermentation","clearing","racking","distillation","carbon","dilution"];
function masterDistillerCard(){return '<div class="card" style="border-color:var(--copper);box-shadow:0 0 22px var(--copper-glow)"><div class="card-h"><span class="eyebrow">Assessment</span><h2>🥃 Master Distiller</h2><button class="btn sm ghost" onclick="renderView()">↻ Refresh</button></div><div class="card-b">'+mdAlertsHTML()+'<div id="mdBody">'+mdRuleHTML()+'</div></div></div>';}
function mdAlerts(){var out=[];var now=Date.now();db.batches.forEach(function(b){if(ACTIVE_STAGES.indexOf(b.stage)<0)return;var temp=parseFloat(b.temp||latest(b,"temp"));if(b.stage==="fermentation"){if(!isNaN(temp)&&temp<16)out.push({level:"warn",text:esc(b.code)+" is running cool at "+temp+"°C — wrap it toward 18–20°C.",tab:"fermentation"});else if(!isNaN(temp)&&temp>30)out.push({level:"warn",text:esc(b.code)+" is hot at "+temp+"°C — cool it toward 20–24°C.",tab:"fermentation"});var day=dayNum(b);var og=parseFloat(b.startGravity),sg=parseFloat(b.currentGravity),fg=parseFloat(b.predictedFG);var atTarget=(og&&sg&&fg)&&(sg<=fg+0.002);if(atTarget)out.push({level:"info",text:esc(b.code)+" has hit target gravity — take a confirming reading, then let it clear.",tab:"fermentation"});else if((b.bubble==="Slow"||b.bubble==="None")&&day>=5)out.push({level:"info",text:esc(b.code)+" looks like it's finishing (day "+day+", "+String(b.bubble||"quiet").toLowerCase()+") — pull a hydrometer reading.",tab:"fermentation"});if(b.log&&b.log.length){var lastWhen=b.log.reduce(function(m,e){var t=new Date(e.when).getTime();return t>m?t:m;},0);var days=Math.floor((now-lastWhen)/86400000);if(days>=3)out.push({level:"info",text:esc(b.code)+" hasn't been checked in for "+days+" days — a quick update keeps the log honest.",tab:"fermentation"});}}});db.batches.forEach(function(b){if(!b.finish)return;var dt=daysTo(b.finish);if(dt!=null&&dt>=0&&dt<=3){var done=["water","cleaning","jars","cuts"].filter(function(k){return b.prep[k];}).length;if(done<4)out.push({level:"warn",text:esc(b.code)+" distillation in "+dt+" day"+(dt===1?"":"s")+" — prep only "+done+"/4 done.",tab:"dashboard"});}});var low=db.inventory.filter(function(i){return Number(i.qty)<Number(i.min);});if(low.length)out.push({level:"info",text:low.length+" item"+(low.length>1?"s":"")+" low on stock ("+low.slice(0,3).map(function(i){return esc(i.name);}).join(", ")+(low.length>3?"…":"")+").",tab:"inventory"});out.sort(function(a,c){return (a.level==="warn"?0:1)-(c.level==="warn"?0:1);});return out;}
function mdAlertsHTML(){var a=mdAlerts();if(!a.length)return '<div class="mdok">✓ All good — nothing needs your attention right now.</div>';return '<div class="mdalerts">'+a.map(function(x){return '<div class="mdalert '+x.level+'"'+(x.tab?' onclick="go(\''+x.tab+'\')" style="cursor:pointer"':"")+'><span class="ai">'+(x.level==="warn"?"⚠":"●")+'</span><span>'+x.text+'</span></div>';}).join("")+'</div>';}
function mdRuleHTML(){var ferms=db.batches.filter(function(x){return x.stage==="fermentation";});var actives=db.batches.filter(function(x){return ACTIVE_STAGES.indexOf(x.stage)>=0;});if(!actives.length)return '<p class="hint" style="margin:0">No active batches on the go right now. Start one and I\'ll keep an eye on it for you.</p>';var parts=['<p style="margin-top:0">'+mdOverall(actives,ferms)+'</p>'];actives.forEach(function(b){parts.push('<p style="margin:8px 0 0"><strong style="color:var(--copper-lt)">'+esc(b.emoji+" "+b.code)+'</strong> — '+mdAssess(b)+'</p>');});return parts.join("");}
function mdOverall(actives,ferms){var n=ferms.length;var txt=n>=2?(n+" washes fermenting. "):(n===1?"One wash fermenting. ":(actives.length+" batch"+(actives.length>1?"es":"")+" in progress. "));var withFin=actives.filter(function(b){return b.finish;});if(withFin.length){var nearest=withFin.slice().sort(function(a,c){return new Date(a.finish)-new Date(c.finish);})[0];var dt=daysTo(nearest.finish);txt+="Next milestone: "+esc(nearest.code)+" earmarked for the still "+(dt==null?"":(dt<0?Math.abs(dt)+" days ago":"in "+dt+" days"))+". ";}var cold=ferms.filter(function(b){var t=parseFloat(b.temp);return !isNaN(t)&&t<16;});if(cold.length)txt+="Keep an eye on temperature — "+cold.map(function(b){return esc(b.code);}).join(", ")+" "+(cold.length>1?"are":"is")+" running cool. ";else txt+="Everything's tracking nicely. ";return txt;}
function mdAssess(b){if(b.stage!=="fermentation")return mdStageLine(b);var day=dayNum(b);var temp=parseFloat(b.temp||latest(b,"temp"));var bub=b.bubble;var lead="Day "+day+" at "+(isNaN(temp)?"—":temp+"°C")+". ";var read="";if(bub==="Violent"||bub==="Fast")read="Fermenting hard"+(day<=3?" and still early — this is the vigorous phase":"")+". ";else if(bub==="Moderate")read="Ticking along at a steady, healthy pace. ";else if(bub==="Slow")read="Slowed right down — this is the tail end of the ferment. ";else if(bub==="None")read=(day<=1?"Freshly pitched and not started yet. ":"No visible activity. ");var tempAdv="";if(!isNaN(temp)){if(temp<16)tempAdv="A bit cool — wrap it to nudge back to 18–20°C so it finishes cleanly. ";else if(temp>30)tempAdv="Running hot — cool it toward 20–24°C to avoid harsh flavours. ";else if(temp>=18&&temp<=24)tempAdv="Temperature is bang in the sweet spot. ";}var pred="";if(bub==="Violent"||bub==="Fast")pred=(day<=4?"Expect it to keep charging for another 2–4 days before it tapers.":"It's near its peak; watch for it to slow over the next couple of days.");else if(bub==="Moderate")pred="Likely another 3–5 days of steady work before it winds down.";else if(bub==="Slow")pred="Probably 1–3 days from finished. Pull a hydrometer reading — if it holds ~0.990–1.000 for two days, it's done and ready to clear.";else if(bub==="None")pred=(day<=1?"Activity should kick in within 12–24 hours — keep it warm.":"Very likely finished — confirm with a stable gravity reading before you clear it.");var grav="";var og=parseFloat(b.startGravity),sg=parseFloat(b.currentGravity),fg=parseFloat(b.predictedFG);if(og&&sg&&fg){var pct=Math.round(Math.min(100,Math.max(0,((og-sg)/(og-fg))*100)));grav=" Around "+pct+"% attenuated so far.";}var fin="";var dt=daysTo(b.finish);if(dt!=null)fin=" Earmarked for the still "+(dt<0?Math.abs(dt)+" days ago":"in "+dt+" days")+".";return lead+read+tempAdv+pred+grav+fin;}
function mdStageLine(b){var m={clearing:"Clearing now — let it drop bright and don't rush it. A few extra days here means a cleaner spirit in the glass.",racking:"Ready to rack the clear wash off the yeast cake. Take your time so you don't stir up sediment.",distillation:"On the still. Run the reflux slow, bin the foreshots and heads, collect the hearts, and stop into tails.",carbon:"Carbon filtering — good for polishing a neutral. Give it time to strip the last rough edges.",dilution:"Diluting down — use the calculator, add water gradually, and check ABV at 20°C.",bottling:"Bottling stage. Log your count and yield so it lands on the Wall of Fame.",labelling:"Labelling — generate your labels on the Labels tab and record the batch number.",ready:"Finished and ready to drink. Score it on the Wall of Fame while the taste is fresh."};return m[b.stage]||"Tracking along nicely.";}

function gravityBar(b){var og=parseFloat(b.startGravity),sg=parseFloat(b.currentGravity),fg=parseFloat(b.predictedFG);if(!og||!fg)return '<div class="hint" style="margin-bottom:12px">Enter OG and predicted FG to see fermentation progress.</div>';var pct=sg?Math.min(100,Math.max(0,((og-sg)/(og-fg))*100)):0;return '<div style="margin:2px 0 14px"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)"><span>OG '+og.toFixed(3)+'</span><span>'+Math.round(pct)+'% attenuated</span><span>FG '+fg.toFixed(3)+'</span></div><div style="height:10px;background:#15161a;border:1px solid var(--line2);border-radius:6px;overflow:hidden;margin-top:5px"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,var(--copper),#d9a441)"></div></div></div>';}

function toggleJForm(){var h=document.getElementById("jformHolder");if(h.innerHTML){h.innerHTML="";pending=[];return;}pending=[];var now=new Date();var local=new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString().slice(0,16);var b=activeBatch();h.innerHTML='<div class="row"><div class="field" style="flex:0 0 210px"><label>When</label><input type="datetime-local" id="j-when" value="'+local+'"></div><div class="field" style="flex:0 0 120px"><label>Temp °C</label><input id="j-temp" placeholder="18"></div><div class="field"><label>Stage</label><select id="j-stage">'+STAGES.map(function(s){return '<option value="'+s.k+'" '+(s.k===b.stage?"selected":"")+'>'+s.l+'</option>';}).join("")+'</select></div></div><div class="row"><div class="field"><label>Bubble activity</label><select id="j-bub"><option value=""></option>'+BUBBLE.map(function(o){return "<option>"+o+"</option>";}).join("")+'</select></div><div class="field"><label>Smell</label><select id="j-smell">'+SMELLS.map(function(s){return '<option value="'+s+'">'+(s||"—")+'</option>';}).join("")+'</select></div></div><div class="field wide"><label>Notes</label><textarea id="j-note" placeholder="Activity, aroma, actions, hydrometer reading…"></textarea></div><div class="field wide"><label>Photos</label><input type="file" accept="image/*" multiple onchange="addPhotos(this)"><div class="thumbs" id="j-thumbs"></div></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn ghost sm" onclick="toggleJForm()">Cancel</button><button class="btn sm" onclick="saveEntry()">Save check-in</button></div>';}
function addPhotos(input){var files=[].slice.call(input.files);input.value="";files.forEach(function(file){var r=new FileReader();r.onload=function(ev){var img=new Image();img.onload=function(){var max=1000,w=img.width,h=img.height;if(w>max||h>max){var sc=Math.min(max/w,max/h);w=Math.round(w*sc);h=Math.round(h*sc);}var c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);pending.push(c.toDataURL("image/jpeg",0.72));drawThumbs();};img.src=ev.target.result;};r.readAsDataURL(file);});}

function saveEntry(){var b=activeBatch();var when=document.getElementById("j-when").value||new Date().toISOString().slice(0,16);var temp=document.getElementById("j-temp").value.trim();var bubble=document.getElementById("j-bub").value;var smell=document.getElementById("j-smell").value;var stage=document.getElementById("j-stage").value;var note=document.getElementById("j-note").value.trim();if(!temp&&!bubble&&!note&&!pending.length&&!smell){alert("Add a temp, note or photo first.");return;}b.log.push({id:uid(),when:when,stage:stage,temp:temp,bubble:bubble,smell:smell,note:note,photos:pending.slice()});if(temp)b.temp=temp;if(bubble)b.bubble=bubble;if(smell)b.smell=smell;if(stage)b.stage=stage;pending=[];save();renderView();}

function vSettings(b){var bytes=0;try{bytes=(localStorage.getItem(LS_KEY)||"").length;}catch(e){}var photos=db.batches.reduce(function(a,x){return a+x.log.reduce(function(c,e){return c+(e.photos?e.photos.length:0);},0);},0);return '<div class="card"><div class="card-h"><span class="eyebrow">Right now</span><h2>Current Setup</h2></div><div class="card-b"><div class="row"><div class="field"><label>Still type</label><input value="'+esc(db.stillType)+'" onchange="db.stillType=this.value;save()"></div><div class="field"><label>Base wash</label><input value="Sugar + water + yeast" disabled></div></div><p class="hint">Straight sugar-wash neutral spirit on the T500 reflux still. No fruit yet — fruit/pálinka ferments and barrel work are on the roadmap. Core schnapps are made by flavouring the neutral spirit with essence, so they fit the current setup.</p></div></div>'+
  '<div class="card"><div class="card-h"><span class="eyebrow">The workshop</span><h2>Settings &amp; Data</h2></div><div class="card-b"><p class="hint">Everything lives on this device. Back it up regularly.</p><div class="row" style="margin-top:8px"><div class="field"><label>Storage used</label><input value="'+(bytes/1024).toFixed(0)+' KB" disabled></div><div class="field"><label>Batches / photos</label><input value="'+db.batches.length+' batches · '+photos+' photos" disabled></div></div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px"><button class="btn green" onclick="exportData()">⬇ Export backup</button><button class="btn ghost" onclick="document.getElementById(\'importFile\').click()">⬆ Import backup</button><input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(this)"><button class="btn ghost" onclick="resetSeed()">↺ Restore sample data</button></div></div></div>'+
  '<div class="card"><div class="card-h"><span class="eyebrow">Phone + computer</span><h2>Cloud Sync</h2></div><div class="card-b"><p class="hint" id="syncStat">'+(getSync()?"Connected ✓ — updates sync between devices.":"Not connected — data is only on this device.")+'</p><div class="row"><div class="field wide"><label>Supabase Project URL</label><input id="sc-url" placeholder="https://xxxx.supabase.co" value="'+esc((getSync()||{}).url||"")+'"></div></div><div class="row"><div class="field wide"><label>Anon public key</label><input id="sc-key" placeholder="eyJ… paste anon public key" value="'+esc((getSync()||{}).key||"")+'"></div></div><div class="row"><div class="field"><label>Sync passphrase</label><input id="sc-row" placeholder="main" value="'+esc((getSync()||{}).row||"main")+'"></div></div><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn green" onclick="connectCloud()">Connect / Sync now</button>'+(getSync()?'<button class="btn ghost" onclick="pullCheck()">Pull latest</button><button class="btn ghost" onclick="disconnectCloud()">Disconnect</button>':"")+'</div><p class="hint" style="margin-top:10px">Enter the SAME URL, key and passphrase on your phone and computer to link them. Setup steps are in the chat.</p></div></div>'+
  '<div class="card"><div class="card-h"><span class="eyebrow">Identity</span><h2>Brand Notes</h2></div><div class="card-b"><p><strong style="font-family:var(--serif);color:var(--copper-lt)">🔨 Hungarian Hammer</strong> — master brand · vodka, gin, limited & barrel series. <em>Forged in South Australia.</em></p><p><strong style="font-family:var(--serif);color:#e0757b">🫏 Fütyülős Pálinka Banda</strong> — heritage schnapps range. <em>Hungarian tradition, South Australian fruit.</em></p></div></div>';}
function exportData(){var blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="hungarian-hammer-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();}

/* VOICE / AI COMMAND LAYER */
var recog=null,listening=false;
function initVoice(){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;var mic=document.getElementById("micBtn");if(!SR){if(mic)mic.style.display="none";document.getElementById("cmdInput").placeholder="Type what's going on — e.g. “Hungarian Hammer, 16 degrees, bubbling slowly, smells boozy”";return;}recog=new SR();recog.lang="en-AU";recog.interimResults=true;recog.continuous=false;recog.onresult=function(e){var s="";for(var i=0;i<e.results.length;i++)s+=e.results[i][0].transcript;document.getElementById("cmdInput").value=s;};recog.onend=function(){listening=false;if(mic)mic.classList.remove("on");var v=document.getElementById("cmdInput").value.trim();if(v)runCommand();};recog.onerror=function(){listening=false;if(mic)mic.classList.remove("on");};}
function toggleMic(){if(!recog)return;if(listening){recog.stop();return;}document.getElementById("cmdInput").value="";listening=true;document.getElementById("micBtn").classList.add("on");try{recog.start();}catch(e){listening=false;document.getElementById("micBtn").classList.remove("on");}}
function runCommand(){var text=document.getElementById("cmdInput").value.trim();if(!text)return;interpret(text).then(function(p){showResult(p,text);});}
function interpret(text){var rule=parseRules(text);return new Promise(function(resolve){try{if(window.cowork&&typeof window.cowork.askClaude==="function"){var prompt='Return ONLY minified JSON, no prose. Schema: {"temp":number|null,"bubble":"None|Slow|Moderate|Fast|Violent|null","smell":"Sweet|Bread|Fruit|Alcohol|Sulphur|Other|null","stage":"fermentation|clearing|racking|distillation|carbon|dilution|bottling|labelling|ready|null","note":"one cleaned sentence","suggestions":["1-3 short practical tips for a sugar-wash ferment on a reflux still"]}. Spoken note: '+JSON.stringify(text);Promise.resolve(window.cowork.askClaude(prompt,[])).then(function(raw){try{var s=typeof raw==="string"?raw:(raw&&(raw.text||raw.output||raw.content||raw.response))||"";var j=JSON.parse((String(s).match(/\{[\s\S]*\}/)||["{}"])[0]);resolve({batch:rule.batch,temp:(j.temp!==undefined&&j.temp!==null)?j.temp:rule.temp,bubble:j.bubble||rule.bubble,smell:j.smell||rule.smell,stage:j.stage||rule.stage,note:j.note||rule.note,suggestions:(Array.isArray(j.suggestions)&&j.suggestions.length)?j.suggestions:rule.suggestions});}catch(e){resolve(rule);}}).catch(function(){resolve(rule);});}else{resolve(rule);}}catch(e){resolve(rule);}});}
function parseRules(text){var t=" "+text.toLowerCase()+" ";var out={batch:null,temp:null,bubble:null,smell:null,stage:null,note:text.trim(),suggestions:[]};if(/turbo|driver|\btd\b|td[-\s]?0?1/.test(t))out.batch="td1";else if(/hammer|hungarian|\bhh\b|hh[-\s]?0?1/.test(t))out.batch="hh1";var m=t.match(/(-?\d{1,2}(?:\.\d)?)\s*(?:degrees|degree|deg|°|celsius|c\b)/);if(!m)m=t.match(/(?:temp\w*|sitting|it's|its|at|around|about)\s*(?:of|is|at|around|about)?\s*(\d{1,2}(?:\.\d)?)\b/);if(m)out.temp=parseFloat(m[1]);if(/not bubbl|no bubbl|isn'?t bubbl|nothing happening|no activity|\bflat\b|\bdead\b|not doing anything|stopped bubbl|no bubbles/.test(t))out.bubble="None";else if(/violent|vigorous|going crazy|erupting|super active|like crazy/.test(t))out.bubble="Violent";else if(/almost constant|constantly|\bconstant\b|non.?stop|every second(?: or so)?|every (?:1|one)(?:\s*(?:to|-|–|and)\s*(?:2|two))?\s*sec|1\s*[-–to ]+2\s*sec|flying|really fast|chugging hard/.test(t))out.bubble="Fast";else if(/every (?:5|five|few|couple|several|3|three|4|four|10|ten)\s*sec|moderate|steady|chugging|good pace|ticking along/.test(t))out.bubble="Moderate";else if(/slow|occasional|every (?:minute|min|2 ?min|two min|20|30)\b|once a min|barely|tapering|slowing|winding down|couple (?:of )?bubbl/.test(t))out.bubble="Slow";else if(/\bfast\b|rapid|quick/.test(t))out.bubble="Fast";if(/sweet/.test(t))out.smell="Sweet";else if(/bread|yeasty|yeast smell|doughy/.test(t))out.smell="Bread";else if(/fruit/.test(t))out.smell="Fruit";else if(/alcohol|booze|boozy|spirit|ethanol|sharp smell/.test(t))out.smell="Alcohol";else if(/sulph|sulf|rotten egg|egg smell/.test(t))out.smell="Sulphur";if(/clearing|going clear|dropping clear/.test(t))out.stage="clearing";else if(/\brack/.test(t))out.stage="racking";else if(/distill|still run|running the still|stripping|spirit run/.test(t))out.stage="distillation";else if(/carbon|filter/.test(t))out.stage="carbon";else if(/dilut|water(?:ing)? down|proofing|bringing.*down to/.test(t))out.stage="dilution";else if(/bottl/.test(t))out.stage="bottling";else if(/\blabel/.test(t))out.stage="labelling";else if(/ready to drink|all done|finished product/.test(t))out.stage="ready";else if(/ferment|bubbl|wash|pitched|day\s*\d|aroma/.test(t))out.stage="fermentation";if(!out.stage&&(out.bubble||out.smell))out.stage="fermentation";out.suggestions=suggestFor(out,t);return out;}
function suggestFor(p,t){var s=[];if(p.temp!=null){if(p.temp<16)s.push("At "+p.temp+"°C it's on the cool side — wrap it or move it somewhere warmer to bring it back to 18–20°C for a healthy ferment.");else if(p.temp>30)s.push(p.temp+"°C is hot — that risks harsh, solventy flavours. Cool it toward 20–24°C.");else if(p.temp>=18&&p.temp<=24)s.push(p.temp+"°C is right in the sweet spot — leave it be.");else if(p.temp>24&&p.temp<=30)s.push(p.temp+"°C is a touch warm but fine — just keep an eye it doesn't climb past 30°C.");}if(p.bubble==="None")s.push("No activity: if it's the first 12–24h that's normal, keep it ~20°C. If it's been days, it's likely finished — take a hydrometer reading before anything else.");if(p.bubble==="Violent"||p.bubble==="Fast")s.push("Strong, active ferment — right where you want it. Don't touch it, just hold the temperature steady.");if(p.bubble==="Slow")s.push("Slowing right down usually means it's near the end. Take a gravity reading — if it holds around 0.990–1.000 for two days, it's done and ready to clear.");if(/\bleak/.test(t))s.push("You mentioned a leak — check the tap/seal so you don't lose wash or let air in.");if(p.stage==="clearing")s.push("Let it drop bright and clear fully before racking — patience here means a cleaner spirit.");if(p.stage==="distillation")s.push("Reflux still: run it slow for a clean neutral cut. Bin the foreshots/heads, collect the hearts, then stop into tails.");if(p.stage==="dilution")s.push("Use the Dilution Calculator on the Distillation tab — add water gradually and re-check ABV at 20°C.");if(!s.length)s.push("Logged. Nothing needs action right now — keep the daily check-ins coming.");return s;}
function showResult(p,text){var b=(p.batch&&db.batches.find(function(x){return x.id===p.batch;}))||activeBatch();var batchOpts=db.batches.map(function(x){return '<option value="'+x.id+'" '+(x.id===b.id?"selected":"")+">"+esc(x.emoji)+" "+esc(x.code)+"</option>";}).join("");document.getElementById("cmdResult").innerHTML='<div class="cmdcard"><h4>Here\'s what I understood</h4><div class="hint" style="margin-bottom:11px">Check it, tweak anything, then apply — it fills the fields and adds a journal entry for you.</div><div class="row"><div class="field"><label>Batch</label><select id="ci-batch">'+batchOpts+'</select></div><div class="field"><label>Temp °C</label><input id="ci-temp" value="'+(p.temp!=null?p.temp:"")+'"></div><div class="field"><label>Stage</label><select id="ci-stage"><option value=""></option>'+STAGES.map(function(s){return '<option value="'+s.k+'" '+(s.k===p.stage?"selected":"")+'>'+s.l+'</option>';}).join("")+'</select></div></div><div class="row"><div class="field"><label>Bubble</label><select id="ci-bubble"><option value=""></option>'+BUBBLE.map(function(o){return '<option '+(o===p.bubble?"selected":"")+'>'+o+'</option>';}).join("")+'</select></div><div class="field"><label>Smell</label><select id="ci-smell">'+SMELLS.map(function(s){return '<option value="'+s+'" '+(s===p.smell?"selected":"")+'>'+(s||"—")+'</option>';}).join("")+'</select></div></div><div class="field wide"><label>Note</label><textarea id="ci-note">'+esc(p.note||text)+'</textarea></div><div style="margin:8px 0 4px"><div class="eyebrow">Suggestions</div>'+p.suggestions.map(function(x){return '<div class="sg"><span class="i">◆</span><span>'+esc(x)+'</span></div>';}).join("")+'</div><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px"><button class="btn ghost sm" onclick="document.getElementById(\'cmdResult\').innerHTML=\'\'">Dismiss</button><button class="btn sm" onclick="applyCmd()">Apply &amp; log</button></div></div>';document.getElementById("cmdResult").scrollIntoView({behavior:"smooth",block:"nearest"});}
function applyCmd(){var bid=document.getElementById("ci-batch").value;var b=db.batches.find(function(x){return x.id===bid;})||activeBatch();db.active=b.id;var temp=document.getElementById("ci-temp").value.trim();var bubble=document.getElementById("ci-bubble").value;var smell=document.getElementById("ci-smell").value;var stage=document.getElementById("ci-stage").value;var note=document.getElementById("ci-note").value.trim();if(temp)b.temp=temp;if(bubble)b.bubble=bubble;if(smell)b.smell=smell;if(stage)b.stage=stage;b.log.push({id:uid(),when:new Date().toISOString().slice(0,16),stage:stage||b.stage,temp:temp,bubble:bubble,smell:smell,note:note||"Voice check-in",photos:[]});save();document.getElementById("cmdResult").innerHTML="";document.getElementById("cmdInput").value="";renderAll();toast("✓ Logged to "+b.code);}
function toast(msg){var t=document.getElementById("toast");if(!t){t=document.createElement("div");t.id="toast";t.className="toast";document.body.appendChild(t);}t.textContent=msg;t.classList.add("show");clearTimeout(window._tt);window._tt=setTimeout(function(){t.classList.remove("show");},2600);}

/* CLOUD SYNC (Supabase) */
var SYNC_KEY="hhSyncCfg",pushTimer=null,pullTimer=null,focusBound=false;
function getSync(){try{return JSON.parse(localStorage.getItem(SYNC_KEY)||"null");}catch(e){return null;}}
function setSyncCfg(c){localStorage.setItem(SYNC_KEY,JSON.stringify(c));}
function clearSyncCfg(){localStorage.removeItem(SYNC_KEY);}
function cloudURL(c){return c.url.replace(/\/+$/,"")+"/rest/v1/"+(c.table||"distillery");}
function cloudHeaders(c){return {apikey:c.key,Authorization:"Bearer "+c.key,"Content-Type":"application/json"};}
function cloudPull(){var c=getSync();if(!c||!window.fetch)return Promise.resolve(null);return fetch(cloudURL(c)+"?id=eq."+encodeURIComponent(c.row)+"&select=data",{headers:cloudHeaders(c)}).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}).then(function(rows){return rows&&rows[0]?rows[0].data:null;});}
function cloudPush(){var c=getSync();if(!c||!window.fetch)return Promise.resolve();var body=[{id:c.row,data:db,updated_at:new Date().toISOString()}];return fetch(cloudURL(c),{method:"POST",headers:Object.assign({Prefer:"resolution=merge-duplicates"},cloudHeaders(c)),body:JSON.stringify(body)}).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);});}
function schedulePush(){if(!getSync())return;clearTimeout(pushTimer);pushTimer=setTimeout(function(){cloudPush().then(function(){setSyncStatus("Saved to cloud ✓");}).catch(function(e){setSyncStatus("Cloud save failed — "+e.message);});},700);}
function applyRemote(remote){db=remote;migrate();saveLocal();renderAll();}
function pullCheck(){cloudPull().then(function(remote){if(remote&&remote.batches){var rt=remote._ts||0,lt=db._ts||0;if(rt>lt){applyRemote(remote);setSyncStatus("Synced from cloud ✓");if(typeof toast==="function")toast("Synced from cloud");}}}).catch(function(){});}
function startPull(){if(pullTimer)clearInterval(pullTimer);pullTimer=setInterval(pullCheck,20000);if(!focusBound){window.addEventListener("focus",pullCheck);focusBound=true;}}
function cloudInit(){var c=getSync();if(!c)return;setSyncStatus("Connecting…");cloudPull().then(function(remote){if(remote&&remote.batches){var rt=remote._ts||0,lt=db._ts||0;if(rt>=lt){applyRemote(remote);}else{cloudPush();}}else{cloudPush();}startPull();setSyncStatus("Connected ✓");}).catch(function(e){setSyncStatus("Not reachable — working offline ("+e.message+")");});}
function setSyncStatus(msg){var el=document.getElementById("syncStat");if(el)el.textContent=msg;}
function connectCloud(){var url=document.getElementById("sc-url").value.trim();var key=document.getElementById("sc-key").value.trim();var row=document.getElementById("sc-row").value.trim()||"main";if(!url||!key){alert("Paste your Project URL and anon key first.");return;}setSyncCfg({url:url,key:key,row:row,table:"distillery"});setSyncStatus("Connecting…");cloudPull().then(function(remote){if(remote&&remote.batches){if(confirm("Cloud already has data saved under this passphrase. Load it onto this device? (OK = use cloud data · Cancel = push this device's data up instead.)")){applyRemote(remote);}else{cloudPush();}}else{cloudPush();}startPull();setSyncStatus("Connected ✓");renderView();toast("Cloud sync connected");}).catch(function(e){setSyncStatus("Couldn't connect — "+e.message);alert("Couldn't connect: "+e.message+"\nCheck the URL, the anon key, and that a table named 'distillery' exists.");});}
function disconnectCloud(){clearSyncCfg();if(pullTimer)clearInterval(pullTimer);setSyncStatus("Disconnected");renderView();}

load();renderAll();initVoice();cloudInit();
