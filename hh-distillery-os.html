<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hungarian Hammer Distillery OS</title>
<meta name="theme-color" content="#0D0D0D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="HH Distillery">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Crect%20width='100'%20height='100'%20rx='20'%20fill='%230D0D0D'/%3E%3Ccircle%20cx='50'%20cy='50'%20r='34'%20fill='none'%20stroke='%23B87333'%20stroke-width='4'/%3E%3Cg%20transform='rotate(45%2050%2050)'%20fill='%23B87333'%3E%3Crect%20x='47'%20y='32'%20width='6'%20height='36'%20rx='1.5'/%3E%3Crect%20x='39'%20y='28'%20width='22'%20height='12'%20rx='2'/%3E%3C/g%3E%3C/svg%3E">
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Hungarian%20Hammer%20Distillery%20OS%22%2C%22short_name%22%3A%22HH%20Distillery%22%2C%22display%22%3A%22standalone%22%2C%22orientation%22%3A%22portrait-primary%22%2C%22background_color%22%3A%22%230D0D0D%22%2C%22theme_color%22%3A%22%230D0D0D%22%2C%22start_url%22%3A%22.%22%7D">
<style>
:root{color-scheme:dark;--black:#0D0D0D;--gun:#2B2E34;--gun2:#23262b;--copper:#B87333;--copper-lt:#d6934c;--copper-glow:#b8733355;--steel:#8C8F94;--steel-dim:#6b6e73;--burgundy:#8B1E1E;--cream:#F5EFE6;--hred:#C8102E;--green:#225E3E;--green-lt:#3a8a5f;--brown:#7A5A3A;--ink:#F5EFE6;--muted:#8C8F94;--line:#3a3d4488;--line2:#43464d;--serif:"Cormorant Garamond","Cinzel",Georgia,"Times New Roman",serif;--sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;--noise:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/></svg>");}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--noise),radial-gradient(1000px 460px at 82% -12%,#1c1f24 0,transparent 62%),linear-gradient(180deg,#0f1013 0,#0a0b0d 100%);background-attachment:fixed;color:var(--ink);min-height:100vh;font-family:var(--sans);font-size:14.5px;line-height:1.55;-webkit-font-smoothing:antialiased}
.app{max-width:1180px;margin:0 auto;padding:16px 14px 90px}
.masthead{display:flex;align-items:center;gap:14px;padding:4px 4px 14px;border-bottom:1px solid var(--line2);margin-bottom:16px;flex-wrap:wrap}
.badge-logo{width:52px;height:52px;flex:0 0 auto;filter:drop-shadow(0 4px 10px #0008)}
.brandwrap{flex:1;min-width:180px}
.brandwrap h1{margin:0;font-family:var(--serif);font-size:25px;font-weight:700;letter-spacing:2px;text-transform:uppercase;line-height:1}
.brandwrap h1 .cu{color:var(--copper-lt)}
.brandwrap .tl{color:var(--copper);font-size:10px;letter-spacing:4px;text-transform:uppercase;margin-top:4px;font-weight:600}
.mhright{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.mh-date{font-size:11px;color:var(--muted);text-align:right}
.statuschip{display:flex;align-items:center;gap:7px;background:var(--gun2);border:1px solid var(--line2);border-radius:10px;padding:7px 11px;font-size:12px;font-weight:600}
.batchpick select{background:var(--gun2);color:var(--ink);border:1px solid var(--line2);border-radius:9px;padding:8px 10px;font-size:12.5px;font-weight:600}
.hamb{display:none;flex:0 0 auto;width:42px;height:42px;border-radius:11px;border:1px solid var(--line2);background:var(--gun2);color:var(--copper-lt);font-size:20px;cursor:pointer}
.hamb:hover{border-color:var(--copper)}
.cmdbar{display:flex;gap:8px;align-items:center;background:linear-gradient(180deg,rgba(43,46,52,.85),rgba(28,30,35,.85));border:1px solid var(--line2);border-radius:14px;padding:8px;margin-bottom:16px;box-shadow:0 8px 26px #0005}
.cmdbar input{flex:1;min-width:120px}
.mic{flex:0 0 auto;width:44px;height:44px;border-radius:11px;border:1px solid var(--line2);background:var(--gun2);color:var(--copper-lt);font-size:19px;cursor:pointer}
.mic:hover{border-color:var(--copper)}
.mic.on{background:var(--burgundy);color:#fff;border-color:var(--hred);animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #c8102e66}50%{box-shadow:0 0 0 8px #c8102e00}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--green);color:#eafff2;padding:10px 18px;border-radius:10px;font-weight:700;z-index:95;box-shadow:0 6px 20px #0007;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
.shell{display:flex;gap:18px;align-items:flex-start}
.sidebar{flex:0 0 200px;position:sticky;top:14px}
.nav{display:flex;flex-direction:column;gap:3px;background:linear-gradient(180deg,rgba(43,46,52,.7),rgba(28,30,35,.7));border:1px solid var(--line2);border-radius:14px;padding:8px}
.nav .ni{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;color:var(--steel);font-size:13.5px;font-weight:600;cursor:pointer;border:1px solid transparent}
.nav .ni .ico{width:17px;text-align:center}
.nav .ni:hover{color:var(--cream);background:#ffffff08}
.nav .ni.active{color:var(--cream);background:linear-gradient(90deg,var(--copper-glow),transparent);border-color:var(--copper);box-shadow:inset 2px 0 0 var(--copper)}
.newbatch{margin-top:8px;width:100%}
.main{flex:1;min-width:0}
.card{background:linear-gradient(180deg,rgba(43,46,52,.72),rgba(30,32,37,.72));border:1px solid var(--line2);border-radius:16px;box-shadow:0 8px 26px #0005;overflow:hidden}
.card+.card{margin-top:16px}
.card-h{padding:13px 17px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.card-h h2{margin:0;font-family:var(--serif);font-size:17px;font-weight:700;letter-spacing:1px;color:var(--cream)}
.card-h .eyebrow{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--copper);font-weight:700}
.card-b{padding:17px}
.hint{color:var(--muted);font-size:12px}
.btn{border:none;border-radius:10px;padding:9px 15px;font-size:13.5px;font-weight:700;cursor:pointer;background:linear-gradient(180deg,var(--copper-lt),var(--copper));color:#1a0f05;letter-spacing:.3px;font-family:var(--sans)}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:var(--gun2);color:var(--steel);border:1px solid var(--line2)}
.btn.ghost:hover{color:var(--cream);border-color:var(--copper)}
.btn.sm{padding:6px 11px;font-size:12.5px}
.btn.red{background:transparent;color:#d9686e;padding:6px 8px}
.btn.green{background:linear-gradient(180deg,var(--green-lt),var(--green));color:#eafff2}
.btn.steel{background:linear-gradient(180deg,#cdd0d5,#9a9da3);color:#161a1f}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.tile{background:linear-gradient(180deg,#31343b,#25272c);border:1px solid var(--line2);border-radius:13px;padding:13px 14px;position:relative;overflow:hidden}
.tile .k{font-size:10px;text-transform:uppercase;letter-spacing:1.4px;color:var(--steel-dim);font-weight:700}
.tile .v{font-family:var(--serif);font-size:26px;font-weight:700;margin-top:4px}
.tile .v small{font-size:13px;color:var(--muted);font-weight:600;font-family:var(--sans)}
.tile.hot .v{color:var(--copper-lt)}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle}
.bubbles{position:absolute;right:8px;bottom:0;width:40px;height:100%;pointer-events:none;opacity:.5}
.bubbles span{position:absolute;bottom:-6px;width:5px;height:5px;border-radius:50%;background:var(--copper-lt);animation:rise 3.2s linear infinite}
.bubbles span:nth-child(2){left:12px;width:4px;height:4px;animation-delay:.9s}
.bubbles span:nth-child(3){left:22px;width:6px;height:6px;animation-delay:1.7s}
.bubbles span:nth-child(4){left:30px;width:3px;height:3px;animation-delay:2.3s}
@keyframes rise{0%{transform:translateY(0);opacity:0}15%{opacity:.9}100%{transform:translateY(-64px);opacity:0}}
.row{display:flex;gap:12px;flex-wrap:wrap}
.field{flex:1;min-width:130px;margin-bottom:12px}
.field.wide{flex-basis:100%}
label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--steel-dim);font-weight:700;margin-bottom:5px}
input,select,textarea{width:100%;background:#15161a;color:var(--ink);border:1px solid var(--line2);border-radius:9px;padding:9px 10px;font-size:14px;font-family:inherit}
textarea{min-height:64px;resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--copper);box-shadow:0 0 0 3px var(--copper-glow)}
.radios{display:flex;gap:6px;flex-wrap:wrap}
.radios .opt{flex:1;min-width:62px;text-align:center;background:#15161a;border:1px solid var(--line2);border-radius:8px;padding:7px 4px;font-size:12.5px;font-weight:600;color:var(--steel-dim);cursor:pointer}
.radios .opt.on{background:linear-gradient(180deg,var(--copper-lt),var(--copper));color:#1a0f05;border-color:var(--copper)}
.timeline{display:flex;flex-wrap:wrap}
.stg{display:flex;align-items:center}
.stnode{display:flex;flex-direction:column;align-items:center;cursor:pointer;min-width:80px;padding:4px 2px}
.stbead{width:28px;height:28px;border-radius:50%;border:2px solid var(--line2);background:#15161a;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--steel-dim)}
.stnode .lbl{font-family:var(--serif);font-size:11px;text-align:center;margin-top:6px;color:var(--steel-dim);max-width:80px}
.stnode.cur .stbead{box-shadow:0 0 0 4px #ffffff12,0 0 16px currentColor;transform:scale(1.1)}
.stbar{width:24px;height:2px;background:var(--line2);margin-top:13px}
.entry{display:flex;gap:12px;padding:13px 0;border-bottom:1px dashed var(--line)}
.entry:last-child{border-bottom:none}
.entry .ed{flex:0 0 auto;width:10px;height:10px;border-radius:50%;background:var(--copper);margin-top:6px;box-shadow:0 0 0 3px var(--copper-glow)}
.ewhen{font-size:12px;color:var(--muted);font-weight:700}
.etags{display:flex;gap:7px;flex-wrap:wrap;margin:5px 0}
.tag{font-size:11px;background:#15161a;border:1px solid var(--line2);color:var(--steel);border-radius:6px;padding:2px 8px;font-weight:600}
.enote{white-space:pre-wrap;margin-top:3px}
.ephotos{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
.ephotos img{width:92px;height:92px;object-fit:cover;border-radius:9px;border:1px solid var(--line2);cursor:pointer}
.entry .del{opacity:0}
.entry:hover .del{opacity:1}
.lrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.lrow:last-child{border-bottom:none}
.lrow .nm{flex:1;font-weight:600}
.lrow .sub{color:var(--muted);font-size:12px;font-weight:400}
.qty{width:70px!important;text-align:center}
.chip{font-size:10.5px;padding:2px 8px;border-radius:999px;font-weight:700}
.chip.low{background:#3a1516;color:#e0757b}
.chip.ok{background:#12301f;color:#4fbe80}
.check{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer}
.check:last-child{border-bottom:none}
.check .box{width:22px;height:22px;border-radius:6px;border:2px solid var(--line2);display:grid;place-items:center;font-size:13px;color:transparent}
.check.on .box{background:var(--green);border-color:var(--green-lt);color:#eafff2}
.check.on .ctxt{color:var(--muted);text-decoration:line-through}
.wof{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.fame{background:linear-gradient(180deg,#2b2e34,#1a1c20);border:1px solid var(--line2);border-radius:14px;padding:16px;position:relative;overflow:hidden}
.fame .medal{position:absolute;top:12px;right:14px;font-size:22px}
.fame h3{margin:0 0 2px;font-family:var(--serif);font-size:17px}
.fame .nick{color:var(--copper-lt);font-size:12.5px;font-style:italic;margin-bottom:11px}
.fame .fg{display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:12.5px}
.fame .fg .k{color:var(--steel-dim)}
.stars{color:#d9a441;letter-spacing:1px}
.label-preview{background:var(--cream);color:#1a1512;border-radius:5px;padding:22px;width:300px;margin:0 auto;text-align:center;box-shadow:0 10px 34px #000a;border:1px solid #d8cdbb}
.label-preview .lp-emoji{font-size:30px}
.label-preview .lp-brand{font-family:var(--serif);font-weight:700;letter-spacing:3px;font-size:21px;text-transform:uppercase;margin:4px 0}
.label-preview .lp-tl{font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:#7a6f60}
.label-preview .lp-rule{height:2px;background:#1a1512;margin:9px auto;width:58%}
.label-preview .lp-prod{font-family:var(--serif);font-size:17px;letter-spacing:2px;text-transform:uppercase;margin:6px 0}
.label-preview .lp-abv{font-family:var(--serif);font-size:27px;font-weight:700}
.label-preview .lp-meta{font-size:10.5px;letter-spacing:1px;color:#5a5148;margin-top:10px;text-transform:uppercase}
.label-preview .lp-batch{font-size:11.5px;font-weight:700;letter-spacing:2px;margin-top:6px}
.gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.gal figure{margin:0}
.gal img{width:100%;height:120px;object-fit:cover;border-radius:10px;border:1px solid var(--line2);cursor:pointer}
.gal figcaption{font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase}
.lb{position:fixed;inset:0;background:#060607ee;display:none;align-items:center;justify-content:center;z-index:90;padding:24px}
.lb.open{display:flex}
.lb img{max-width:100%;max-height:100%;border-radius:12px}
.lb .close{position:absolute;top:14px;right:20px;color:#fff;font-size:32px;background:none;border:none;cursor:pointer}
.modal{position:fixed;inset:0;background:#06060799;display:none;align-items:center;justify-content:center;z-index:80;padding:20px}
.modal.open{display:flex}
.modal .mcard{background:var(--gun);border:1px solid var(--line2);border-radius:16px;padding:20px;max-width:470px;width:100%;max-height:90vh;overflow:auto}
.modal h3{margin:0 0 14px;font-family:var(--serif);font-size:19px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:820px){
  .shell{flex-direction:column}
  .sidebar{position:static;flex:1 1 auto;width:100%}
  .nav{display:none;margin-bottom:8px}
  .nav.open{display:flex}
  .newbatch{width:100%}
  .grid2{grid-template-columns:1fr}
  .hamb{display:inline-flex;align-items:center;justify-content:center}
  .brandwrap h1{font-size:20px}
}
</style>
</head>
<body>
<div class="app">
  <div class="masthead">
    <button class="hamb" onclick="toggleNav()" aria-label="Menu">☰</button>
    <svg class="badge-logo" viewBox="0 0 100 100" aria-label="Hungarian Hammer Distillery">
      <defs><radialGradient id="cop" cx="50%" cy="38%" r="70%"><stop offset="0%" stop-color="#e0a05a"/><stop offset="55%" stop-color="#B87333"/><stop offset="100%" stop-color="#5f3a18"/></radialGradient></defs>
      <circle cx="50" cy="50" r="47" fill="#15161a" stroke="url(#cop)" stroke-width="3"/>
      <circle cx="50" cy="50" r="41" fill="none" stroke="#B87333" stroke-width="1" opacity=".5"/>
      <g stroke="#B87333" stroke-width="1.4" opacity=".55"><line x1="50" y1="10" x2="50" y2="18"/><line x1="50" y1="82" x2="50" y2="90"/><line x1="10" y1="50" x2="18" y2="50"/><line x1="82" y1="50" x2="90" y2="50"/></g>
      <g transform="rotate(45 50 50)" fill="url(#cop)" stroke="#4a2c12" stroke-width="1"><rect x="47" y="30" width="6" height="40" rx="1.5"/><rect x="38" y="26" width="24" height="13" rx="2.5"/></g>
    </svg>
    <div class="brandwrap"><h1><span class="cu">Hungarian</span> Hammer</h1><div class="tl">Distillery · Forged in South Australia</div></div>
    <div class="mhright"><div class="statuschip" id="mhStatus"></div><div class="batchpick"><select id="activePick" onchange="setActive(this.value)"></select></div><div class="mh-date" id="mhDate"></div></div>
  </div>

  <div class="cmdbar">
    <button id="micBtn" class="mic" onclick="toggleMic()" title="Speak">🎙️</button>
    <input id="cmdInput" placeholder="Say or type what's going on" onkeydown="if(event.key==='Enter')runCommand()">
    <button class="btn" onclick="runCommand()">Log it</button>
  </div>

  <div class="shell">
    <aside class="sidebar"><nav class="nav" id="nav"></nav><button class="btn newbatch" onclick="openBatchModal()">+ New batch</button></aside>
    <main class="main" id="view"></main>
  </div>
</div>

<div class="lb" id="lb" onclick="closeLB()"><button class="close">&times;</button><img id="lbimg" alt=""></div>

<div class="modal" id="batchModal"><div class="mcard"><h3>New batch</h3>
  <div class="row"><div class="field"><label>Emoji</label><input id="nbEmoji" value="🔨" maxlength="4"></div><div class="field"><label>Code</label><input id="nbCode" placeholder="HH-002"></div><div class="field"><label>Brand</label><select id="nbBrand"><option value="hammer">🔨 Hammer</option><option value="palinka">🫏 Palinka</option></select></div></div>
  <div class="row"><div class="field"><label>Product</label><input id="nbProduct" placeholder="Vodka"></div><div class="field"><label>Yeast</label><input id="nbYeast" placeholder="Turbo"></div></div>
  <div class="row"><div class="field"><label>Start date</label><input id="nbStart" type="date"></div><div class="field"><label>Planned distil</label><input id="nbFinish" type="date"></div></div>
  <div class="row" style="justify-content:flex-end;gap:8px"><button class="btn ghost sm" onclick="closeBatchModal()">Cancel</button><button class="btn sm" onclick="saveBatch()">Create</button></div>
</div></div>

<script>
var LS_KEY="hhDistilleryOS_v2";
var STAGES=[{k:"fermentation",l:"Fermentation",c:"#3a8a5f"},{k:"distillation",l:"Distillation",c:"#d6934c"},{k:"bottling",l:"Bottling",c:"#d9a441"},{k:"ready",l:"Ready",c:"#3a8a5f"}];
function stageLabel(k){var s=STAGES.find(function(x){return x.k===k;});return s?s.l:"Fermentation";}
function stageColor(k){var s=STAGES.find(function(x){return x.k===k;});return s?s.c:"#3a8a5f";}
var BUBBLE=["None","Slow","Moderate","Fast","Violent"];
function uid(){return Math.random().toString(36).slice(2,10);}
function seed(){return{active:"hh1",batches:[{id:"hh1",code:"HH-001",emoji:"🔨",brand:"hammer",product:"Vodka",yeast:"Turbo",start:"2026-07-05",finish:"2026-07-26",stage:"fermentation",temp:"16",bubble:"Slow",bottling:{count:"",size:"700"},yieldL:"",abv:"",log:[{id:uid(),when:"2026-07-05T18:30",stage:"fermentation",temp:"",bubble:"",note:"Batch started.",photos:[]},{id:uid(),when:"2026-07-06T06:30",stage:"fermentation",temp:"20",bubble:"Fast",note:"Day 1. Flying.",photos:[]}]}]};};
var db;
function load(){try{var raw=localStorage.getItem(LS_KEY);db=raw?JSON.parse(raw):seed();}catch(e){db=seed();}if(!db||!Array.isArray(db.batches)||!db.batches.length)db=seed();}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(db));}catch(e){alert("Storage full");}}
function activeBatch(){return db.batches.find(function(b){return b.id===db.active;})||db.batches[0]||{log:[],bottling:{}};}
function setActive(id){db.active=id;save();renderAll();}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){var m={"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"};return m[c];});}
function fmtWhen(iso){var d=new Date(iso);return d.toLocaleString(undefined,{weekday:"short",day:"numeric",month:"short",hour:"numeric",minute:"2-digit"});}
function fmtDate(d){return d?new Date(d+"T00:00").toLocaleDateString(undefined,{day:"numeric",month:"short",year:"numeric"}):"—";}
function dayNum(b){if(!b.start)return"—";var s=new Date(b.start+"T00:00");return Math.max(1,Math.floor((Date.now()-s)/86400000)+1);}
var NAV=[["dashboard","🎛️","Dashboard"],["fermentation","🫧","Fermentation"],["bottling","🍾","Bottling"],["settings","⚙️","Settings"]];
var cur="dashboard";
function renderNav(){document.getElementById("nav").innerHTML=NAV.map(function(n){return'<div class="ni '+(n[0]===cur?"active":"")+'" onclick="go(\''+n[0]+'\')"><span class="ico">'+n[1]+"</span>"+n[2]+"</div>";}).join("");}
function go(t){cur=t;renderNav();renderView();if(window.innerWidth<=820){var n=document.getElementById("nav");if(n)n.classList.remove("open");}window.scrollTo({top:0,behavior:"smooth"});}
function toggleNav(){var n=document.getElementById("nav");if(n)n.classList.toggle("open");}
function renderPick(){document.getElementById("activePick").innerHTML=db.batches.map(function(b){return'<option value="'+b.id+'" '+(b.id===db.active?"selected":"")+">"+esc(b.emoji)+" "+esc(b.code)+"</option>";}).join("");}
function renderMasthead(){var b=activeBatch();document.getElementById("mhStatus").innerHTML='<span class="dot" style="background:'+stageColor(b.stage)+'"></span>'+esc(b.code)+" · "+stageLabel(b.stage);document.getElementById("mhDate").textContent=new Date().toLocaleDateString(undefined,{weekday:"long",day:"numeric",month:"long"});}
function renderAll(){renderPick();renderNav();renderMasthead();renderView();}
function renderView(){var b=activeBatch();var fn={dashboard:vDashboard,fermentation:vFerment,bottling:vBottles,settings:vSettings}[cur]||vDashboard;document.getElementById("view").innerHTML=fn(b);renderMasthead();}
function vDashboard(b){return'<div class="tiles" style="margin-bottom:16px"><div class="tile"><div class="k">Batches</div><div class="v">'+db.batches.length+'</div></div><div class="tile hot"><div class="k">'+esc(b.code)+' temp</div><div class="v">'+(b.temp||"—")+'<small>°C</small></div></div><div class="tile hot"><div class="k">Bubble</div><div class="v">'+esc(b.bubble||"—")+'</div></div></div><div class="card"><div class="card-h"><h2>Recent</h2></div><div class="card-b">'+(b.log.length?b.log.slice(-3).reverse().map(function(e){return renderEntry(b,e);}).join(""):'<div class="hint">No check-ins yet.</div>')+'</div></div><div class="card" style="margin-top:16px"><div class="card-h"><h2>Batches</h2></div><div class="card-b">'+db.batches.map(function(x){return'<div class="lrow" onclick="setActive(\''+x.id+'\')"><div class="nm">'+esc(x.code)+' · '+esc(x.product)+'<div class="sub">Day '+dayNum(x)+'</div></div></div>';}).join("")+'</div></div>';}
function vFerment(b){return'<div class="card"><div class="card-h"><h2>'+esc(b.code)+'</h2></div><div class="card-b"><div class="row"><div class="field"><label>Temp °C</label><input value="'+esc(b.temp)+'" onchange="b.temp=this.value;save();renderView()"></div><div class="field"><label>Bubble</label><select onchange="b.bubble=this.value;save();renderView()"><option></option>'+BUBBLE.map(function(o){return'<option '+(b.bubble===o?"selected":"")+'>'+o+'</option>';}).join("")+'</select></div></div><div style="display:flex;justify-content:flex-end"><button class="btn" onclick="toggleJForm()">+ Add check-in</button></div></div></div><div class="card"><div class="card-h"><h2>Log</h2></div><div class="card-b" id="jformHolder"></div><div class="card-b" style="padding-top:0">'+( b.log.length?b.log.slice().sort(function(x,y){return new Date(y.when)-new Date(x.when);}).map(function(e){return renderEntry(b,e);}).join(""):'<div class="hint">No check-ins yet.</div>')+'</div></div>';}
function renderEntry(b,e){var t=[];if(e.temp)t.push('<span class="tag">🌡️ '+esc(e.temp)+'°C</span>');if(e.bubble)t.push('<span class="tag">🫧 '+esc(e.bubble)+'</span>');return'<div class="entry"><div class="ed"></div><div style="flex:1"><div class="ewhen">'+fmtWhen(e.when)+' <button class="btn red del" style="font-size:11px" onclick="delEntry(\''+b.id+'\',\''+e.id+'\')">del</button></div>'+(t.length?'<div class="etags">'+t.join("")+'</div>':"")+(e.note?'<div class="enote">'+esc(e.note)+'</div>':"")+'</div></div>';}
var pending=[];
function toggleJForm(){var h=document.getElementById("jformHolder");if(h.innerHTML){h.innerHTML="";pending=[];return;}var now=new Date();var local=new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString().slice(0,16);h.innerHTML='<div class="row"><div class="field"><label>When</label><input type="datetime-local" id="j-when" value="'+local+'"></div><div class="field"><label>Temp</label><input id="j-temp" placeholder="18"></div><div class="field"><label>Bubble</label><select id="j-bub"><option></option>'+BUBBLE.map(function(o){return"<option>"+o+"</option>";}).join("")+'</select></div></div><div class="field wide"><label>Note</label><textarea id="j-note" placeholder="What you observe…"></textarea></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn ghost sm" onclick="toggleJForm()">Cancel</button><button class="btn sm" onclick="saveEntry()">Save</button></div>';}
function saveEntry(){var b=activeBatch();var when=document.getElementById("j-when").value;var temp=document.getElementById("j-temp").value.trim();var bubble=document.getElementById("j-bub").value;var note=document.getElementById("j-note").value.trim();if(!temp&&!bubble&&!note){alert("Add something.");return;}b.log.push({id:uid(),when:when,stage:b.stage,temp:temp,bubble:bubble,note:note,photos:[]});save();renderView();}
function delEntry(bid,eid){if(!confirm("Delete?"))return;var b=db.batches.find(function(x){return x.id===bid;});b.log=b.log.filter(function(x){return x.id!==eid;});save();renderView();}
function vBottles(b){return'<div class="card"><div class="card-h"><h2>Bottling</h2></div><div class="card-b"><div class="row"><div class="field"><label>Bottles</label><input value="'+esc(b.bottling.count)+'" onchange="b.bottling.count=this.value;save()"></div><div class="field"><label>Yield L</label><input value="'+esc(b.yieldL)+'" onchange="b.yieldL=this.value;save()"></div><div class="field"><label>ABV %</label><input value="'+esc(b.abv)+'" onchange="b.abv=this.value;save()"></div></div></div></div>';}
function vSettings(b){return'<div class="card"><div class="card-h"><h2>Settings</h2></div><div class="card-b"><button class="btn green" onclick="exportData()">Export backup</button><button class="btn ghost" onclick="document.getElementById(\'importFile\').click()">Import</button><input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(this)"></div></div>';}
function exportData(){var blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="hh-backup.json";a.click();}
function importData(input){var f=input.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{db=JSON.parse(e.target.result);save();alert("Restored");renderAll();}catch(err){alert("Invalid");}};r.readAsText(f);}
function openBatchModal(){document.getElementById("nbStart").value=new Date().toISOString().slice(0,10);["nbCode","nbProduct","nbYeast","nbFinish"].forEach(function(i){document.getElementById(i).value="";});document.getElementById("nbEmoji").value="🔨";document.getElementById("batchModal").classList.add("open");}
function closeBatchModal(){document.getElementById("batchModal").classList.remove("open");}
function saveBatch(){var code=document.getElementById("nbCode").value.trim();if(!code){alert("Give it a code.");return;}var brand=document.getElementById("nbBrand").value;var nb={id:uid(),code:code,emoji:document.getElementById("nbEmoji").value.trim()||"🔨",brand:brand,product:document.getElementById("nbProduct").value.trim(),yeast:document.getElementById("nbYeast").value.trim(),start:document.getElementById("nbStart").value,finish:document.getElementById("nbFinish").value,stage:"fermentation",temp:"",bubble:"None",bottling:{count:"",size:"700"},yieldL:"",abv:"",log:[]};db.batches.push(nb);db.active=nb.id;closeBatchModal();save();renderAll();}
function openLB(src){document.getElementById("lbimg").src=src;document.getElementById("lb").classList.add("open");}
function closeLB(){document.getElementById("lb").classList.remove("open");}
var recog=null,listening=false;
function initVoice(){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;var mic=document.getElementById("micBtn");if(!SR){if(mic)mic.style.display="none";return;}recog=new SR();recog.lang="en-AU";recog.continuous=false;recog.onresult=function(e){var s="";for(var i=0;i<e.results.length;i++)s+=e.results[i][0].transcript;document.getElementById("cmdInput").value=s;};recog.onend=function(){listening=false;if(mic)mic.classList.remove("on");};recog.onerror=function(){listening=false;if(mic)mic.classList.remove("on");};}
function toggleMic(){if(!recog)return;if(listening){recog.stop();return;}document.getElementById("cmdInput").value="";listening=true;document.getElementById("micBtn").classList.add("on");try{recog.start();}catch(e){listening=false;document.getElementById("micBtn").classList.remove("on");}}
function runCommand(){var text=document.getElementById("cmdInput").value.trim();if(!text)return;var b=activeBatch();b.log.push({id:uid(),when:new Date().toISOString().slice(0,16),stage:b.stage,temp:"",bubble:"",note:text,photos:[]});save();document.getElementById("cmdInput").value="";renderView();toast("Logged to "+b.code);}
function toast(msg){var t=document.getElementById("toast");if(!t){t=document.createElement("div");t.id="toast";t.className="toast";document.body.appendChild(t);}t.textContent=msg;t.classList.add("show");clearTimeout(window._tt);window._tt=setTimeout(function(){t.classList.remove("show");},2600);}
load();renderAll();initVoice();
</script>
</body>
</html>
